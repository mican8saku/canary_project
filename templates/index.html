<!DOCTYPE html>
<html>
<head>
    <title>RP4-Canary Kontroll Update</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; text-align: center; background: #1a1a1a; color: white; padding: 20px; }
        .section { background: #2c3e50; padding: 20px; border-radius: 15px; margin-bottom: 20px; max-width: 400px; margin-left: auto; margin-right: auto; }
        .btn { padding: 20px; width: 45%; font-size: 18px; margin: 5px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; transition: 0.2s; }
        
        /* Färger */
        .btn-motor { background: #3498db; color: white; }
        .btn-on { background: #2ecc71; color: white; }
        .btn-off { background: #e74c3c; color: white; }
        .btn-camera { background: #bdc41d; color: white; }
        .btn-gallery { background: #fac748; color: white; }
        
        .status-box { color: #f1c40f; font-weight: bold; margin-top: 10px; }
        .btn:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <h1>Smart Fågelbur Kontroll</h1>
    <p>Ansluten via Tailscale</p>

    <div class="section">
        <h3>Rullgardin</h3>
        <a onclick="sendCommand('action/upp')"><button class="btn btn-motor">▲ UPP</button></a>
        <a onclick="sendCommand('action/ner')"><button class="btn btn-motor">▼ NER</button></a>
    </div>

    <div class="section">
        <h3>Belysning</h3>
        <a onclick="sendCommand('action/led_on')"><button class="btn btn-on">TÄND</button></a>
        <a onclick="sendCommand('action/led_off')"><button class="btn btn-off">SLÄCK</button></a>
    </div>

        <div class="section">
        <h3>Kamera</h3>
        <a onclick="sendCommand('camera/capture')"><button class="btn btn-camera">TA BILD</button></a>
        <a href="/api/camera/gallery_page"><button class="btn btn-gallery">GALLERI</button></a>
    </div>

        <div class="section">
        <h3>Sensorer</h3>
        <p>Temperatur: <span id="temp-val">--</span> °C</p>
        <p>Luftfuktighet: <span id="hum-val">--</span> %</p>
        <p>Status: <span id="motion-val">Väntar...</span></p>
    </div>

    <div class="status-box">
        Status: {{ status }}
    </div>
</body>
<script>
function sendCommand(command) {
    // Fetch anropar URL:en i bakgrunden utan att ladda om sidan
    fetch('/api/' + command)
        .then(response => response.json())
        .then(data => {
            console.log("Svar från servern:", data.msg);
            // Här kan du uppdatera texten på sidan om du vill
        })
        .catch(err => console.error("Fel:", err));
}

// Funktion för att uppdatera status (temp/fukt) automatiskt var 5:e sekund
setInterval(() => {
    fetch('/api/status')
        .then(res => res.json())
        .then(data => {
            document.getElementById('temp-val').innerText = data.temperature;
            document.getElementById('hum-val').innerText = data.humidity;
            document.getElementById('motion-val').innerText = data.motion ? "RÖRELSE!" : "Stilla";
        });
}, 5000);
</script>
</html>
